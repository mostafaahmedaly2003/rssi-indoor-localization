<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RSSI Training Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; }
  .window {
    width: 780px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }
  .titlebar {
    background: #2d2d2d;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.red { background: #ff5f57; }
  .dot.yellow { background: #ffbd2e; }
  .dot.green { background: #28ca41; }
  .title-text { color: #999; font-size: 13px; margin-left: 12px; font-family: monospace; }
  .terminal {
    background: #0d1117;
    padding: 20px 24px;
    min-height: 420px;
    font-size: 13.5px;
    line-height: 1.7;
    color: #c9d1d9;
  }
  .prompt { color: #58a6ff; }
  .cmd { color: #e6edf3; }
  .line { white-space: pre; }
  .green { color: #3fb950; }
  .yellow { color: #f1c40f; }
  .cyan { color: #58d9f0; }
  .orange { color: #f0883e; }
  .bold { font-weight: bold; color: #e6edf3; }
  .cursor {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: #58a6ff;
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">
    <div class="dot red"></div>
    <div class="dot yellow"></div>
    <div class="dot green"></div>
    <span class="title-text">rssi-indoor-localization — python main.py</span>
  </div>
  <div class="terminal" id="terminal">
    <span class="prompt">~/rssi-indoor-localization $ </span><span class="cmd" id="cmd"></span><span class="cursor" id="cursor"></span>
    <div id="output"></div>
  </div>
</div>

<script>
const command = "python main.py";
const lines = [
  { text: "", delay: 0 },
  { text: "=== RSSI Indoor Localization ===", cls: "bold", delay: 100 },
  { text: "", delay: 200 },
  { text: "[SAVED] models/knn.pkl", cls: "green", delay: 400 },
  { text: "[SAVED] models/mlp.pkl", cls: "green", delay: 600 },
  { text: "[SAVED] models/svm.pkl", cls: "green", delay: 800 },
  { text: "[SAVED] models/scaler.pkl", cls: "green", delay: 1000 },
  { text: "", delay: 1100 },
  { text: "========================================", delay: 1200 },
  { text: "KNN", cls: "cyan bold", delay: 1250 },
  { text: "  Accuracy : 90.0%", cls: "yellow", delay: 1300 },
  { text: "  F1 Score : 0.8980", cls: "yellow", delay: 1350 },
  { text: "  Mean Distance Error: 0.21 m", cls: "yellow", delay: 1400 },
  { text: "========================================", delay: 1450 },
  { text: "", delay: 1500 },
  { text: "========================================", delay: 1600 },
  { text: "MLP", cls: "cyan bold", delay: 1650 },
  { text: "  Accuracy : 80.0%", cls: "yellow", delay: 1700 },
  { text: "  F1 Score : 0.7910", cls: "yellow", delay: 1750 },
  { text: "  Mean Distance Error: 0.41 m", cls: "yellow", delay: 1800 },
  { text: "========================================", delay: 1850 },
  { text: "", delay: 1900 },
  { text: "========================================", delay: 2000 },
  { text: "SVM", cls: "cyan bold", delay: 2050 },
  { text: "  Accuracy : 91.1%", cls: "yellow", delay: 2100 },
  { text: "  F1 Score : 0.9083", cls: "yellow", delay: 2150 },
  { text: "  Mean Distance Error: 0.19 m", cls: "yellow", delay: 2200 },
  { text: "========================================", delay: 2250 },
  { text: "", delay: 2300 },
  { text: "Best model: SVM (91.1%)", cls: "orange bold", delay: 2400 },
  { text: "", delay: 2500 },
  { text: "[SAVED] outputs/confusion_matrices.png", cls: "green", delay: 2600 },
  { text: "[SAVED] outputs/floor_map.png", cls: "green", delay: 2800 },
  { text: "[SAVED] outputs/model_comparison.png", cls: "green", delay: 3000 },
  { text: "", delay: 3100 },
  { text: "All outputs saved to outputs/", cls: "bold", delay: 3200 },
  { text: "Run 'python app.py' to start the Flask API", cls: "bold", delay: 3400 },
];

// Type the command first
const cmdEl = document.getElementById("cmd");
let i = 0;
function typeCmd() {
  if (i < command.length) {
    cmdEl.textContent += command[i++];
    setTimeout(typeCmd, 60);
  } else {
    document.getElementById("cursor").style.display = "none";
    setTimeout(showLines, 300);
  }
}
setTimeout(typeCmd, 800);

// Then show output lines
function showLines() {
  const out = document.getElementById("output");
  lines.forEach(({ text, cls, delay }) => {
    setTimeout(() => {
      const div = document.createElement("div");
      div.className = "line" + (cls ? " " + cls : "");
      div.textContent = text;
      out.appendChild(div);
      // Auto scroll
      div.scrollIntoView({ behavior: "smooth" });
    }, delay);
  });
}
</script>
</body>
</html>
